<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: #fff;
    text-align: center;
    padding: 30px;
}

h1 {
    margin-bottom: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px;
    margin: 20px auto;
    width: 340px;
}

button {
    border: none;
    padding: 8px 12px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.active {
    outline: 2px solid #00cec9;
}

.save-btn {
    background: #00b894;
    color: white;
}

.delete-btn {
    background: #d63031;
    color: white;
}

.edit-btn {
    background: #0984e3;
    color: white;
}

.clear-btn {
    background: #e17055;
    color: white;
}

.logs {
    text-align: left;
    max-height: 250px;
    overflow-y: auto;
}

.log-item {
    background: rgba(255,255,255,0.1);
    padding: 8px;
    margin: 5px 0;
    border-radius: 10px;
}

.stats {
    font-size: 14px;
    opacity: 0.85;
}

#status {
    margin-top: 10px;
    font-size: 14px;
    color: #55efc4;
}
</style>
</head>

<body>

<h1>🌟 My Day Tracker</h1>

<div class="card">
    <h3>Настроение</h3>
    <div class="mood">
        <button onclick="setMood('good', this)">😄</button>
        <button onclick="setMood('ok', this)">😐</button>
        <button onclick="setMood('bad', this)">😢</button>
    </div>
</div>

<div class="card">
    <h3>Активности</h3>

    <label><input type="checkbox" value="study"> 📚 Учился</label><br>
    <label><input type="checkbox" value="sport"> 💪 Спорт</label><br>
    <label><input type="checkbox" value="rest"> 🎮 Отдых</label><br>

    <button class="save-btn" onclick="save()">💾 Сохранить</button>
    <button class="clear-btn" onclick="clearData()">🗑️ Очистить всё</button>

    <div id="status"></div>
</div>

<div class="card">
    <h3>Статистика</h3>
    <div id="stats" class="stats">Загрузка...</div>
</div>

<div class="card">
    <h3>История</h3>
    <div class="logs" id="logs"></div>
</div>

<script>
let mood = "ok";

function setMood(m, btn) {
    mood = m;

    document.querySelectorAll(".mood button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

async function save() {
    const activities = Array.from(document.querySelectorAll("input:checked"))
        .map(el => el.value);

    await fetch("/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ mood, activities })
    });

    document.getElementById("status").innerText = "✅ Сохранено!";
    setTimeout(() => document.getElementById("status").innerText = "", 2000);

    loadLogs();
    loadStats();
}

async function loadLogs() {
    const res = await fetch("/logs");
    const data = await res.json();

    const logs = document.getElementById("logs");
    logs.innerHTML = "";

    data.reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "log-item";

        div.innerHTML = `
            <b>#${item.id}</b> | ${item.date} | ${item.mood} 
            | ${item.activities.join(", ")} 
            | score: ${item.score}
            <br>
            <button class="delete-btn" onclick="deleteItem(${item.id})">❌</button>
            <button class="edit-btn" onclick="editItem(${item.id})">✏️</button>
        `;

        logs.appendChild(div);
    });
}

async function loadStats() {
    const res = await fetch("/stats");
    const data = await res.json();

    document.getElementById("stats").innerText =
        `Всего дней: ${data.total_days}, хороших дней: ${data.good_days}`;
}

async function deleteItem(id) {
    if (!confirm("Удалить запись?")) return;

    await fetch(`/delete/${id}`, { method: "POST" });

    loadLogs();
    loadStats();
}

async function editItem(id) {
    const newMood = prompt("Новое настроение (good / ok / bad):");

    if (!newMood) return;

    await fetch(`/edit/${id}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ mood: newMood })
    });

    loadLogs();
    loadStats();
}

async function clearData() {
    if (!confirm("Удалить ВСЮ историю?")) return;

    await fetch("/clear", { method: "POST" });

    loadLogs();
    loadStats();

    document.getElementById("status").innerText = "🗑️ История очищена";
}

loadLogs();
loadStats();
</script>

</body>
</html>
